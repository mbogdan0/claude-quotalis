<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="extensionName">Quotalis for Claude</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow" data-i18n="popupEyebrow">Quotalis</p>
        <h1 data-i18n="popupHeading">Claude usage</h1>
        <p class="header-status">
          <span data-i18n="summaryUpdatedLabel">Updated</span>
          <span aria-hidden="true">·</span>
          <strong id="updatedValue" data-i18n="never">Never</strong>
        </p>
      </div>
      <button class="icon-button" id="refreshButton" type="button" title="Refresh usage" aria-label="Refresh usage" data-i18n-title="refreshUsage" data-i18n-aria-label="refreshUsage">
        <svg class="refresh-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 6v5h-5"></path>
          <path d="M4 18v-5h5"></path>
          <path d="M6.1 9A7 7 0 0 1 18 6.7L20 11"></path>
          <path d="M17.9 15A7 7 0 0 1 6 17.3L4 13"></path>
        </svg>
      </button>
    </header>

    <section id="content" class="content">
      <div class="empty">
        <div class="loader" aria-hidden="true"></div>
        <p data-i18n="readingUsage">Reading usage...</p>
      </div>
    </section>

    <footer class="footer">
      <a class="footer-link footer-link-source" href="https://github.com/mbogdan0/claude-quotalis" target="_blank" rel="noopener noreferrer" aria-label="View source code on GitHub" data-i18n-aria-label="footerGithubAria">
        <span data-i18n="github">GitHub</span>
      </a>
      <div class="footer-actions">
        <a class="footer-link footer-link-secondary" href="https://claude.ai/code/routines" target="_blank" rel="noopener noreferrer">
          <span data-i18n="optimizeUsage">Optimize usage</span>
        </a>
        <a class="footer-link footer-link-primary" href="https://claude.ai" target="_blank" rel="noopener noreferrer">
          <span data-i18n="openClaude">Open Claude</span>
          <svg class="footer-arrow" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 17 17 7"></path>
            <path d="M9 7h8v8"></path>
          </svg>
        </a>
      </div>
    </footer>
  </main>

  <script src="popup.js"></script>
</body>
</html>
